    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- To do list -->
    <div class="todo-card">
      <h1>To-Do list</h1>

      <!-- Checkbox input -->

            value=""
            aria-label="Checkbox for following text input"
          />
        </div>
        <input

      <div class="input-group mb-3" style="padding: 0px 0px 15px 0px;">
        <input type="text" id ='task-input' class="form-control" placeholder="Add a task to your list" aria-label="Recipient’s username" aria-describedby="button-addon2"/>
        <button class="btn btn-outline-secondary btn-primary" style ="color:white;" type="button" id="add-btn" > + Add </button>
      </div>

       <div class="tab-bar">
        <span id = "all-count" class="tab active" data-filter="all">All (0)</span>
        <span id = "active-count" class="tab active-btn" data-filter="active">Active (0)</span>
        <span id = "completed-count" class="tab complete-btn" data-filter="completed">Completed (0)</span>
       </div>       
        <ul id="task-list"></ul>

    </div>
    <script src="index2.js"></script>
